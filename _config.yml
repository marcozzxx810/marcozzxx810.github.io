# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: MarcoMak
email: marcowingwing@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Marco Mak Chak Wing personal profile page with programming tips and blog.
github_username: marcozzxx810
minimal_mistakes_skin: dark
search: true
google_site_verification: "-S1EFnxI-9dk4ZKr-ssJmISZ21ZUMuFZc5sIl53SK38"
# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: Asia/Hong_Kong # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Marco Mak"
  avatar : "/assets/images/bio-photo.png"
  bio    : "year 3 computer science HKU student, interesed in robotics and software engineering."
  location : "Hong Kong, Asia"
  links:
    - label: "Facebook"
      icon: "fab fa-fw fa-facebook-square"
      url: "https://www.facebook.com/chakwing.mak/"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/marco-mak/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/marcozzxx810"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/marcozzxx810"

footer:
  links:
    - label: "Facebook"
      icon: "fab fa-fw fa-facebook-square"
      url: "https://www.facebook.com/chakwing.mak/"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/marco-mak/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/marcozzxx810"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/marcozzxx810"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      show_date: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

#Google Social
social:
  type:  Person
  name:  Mak Chak Wing Marco
  links:
    - "https://www.facebook.com/chakwing.mak/"
    - "https://instagram.com/marcozzxx810"
    - "https://www.linkedin.com/in/marco-mak/"
    - "https://github.com/marcozzxx810"

analytics:
